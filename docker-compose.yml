version: "3.9"

services:

  # ── 1. PostgreSQL ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: catpomo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       catpomo
      POSTGRES_USER:     catpomo
      POSTGRES_PASSWORD: catpomo_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catpomo -d catpomo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Node.js API ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: catpomo-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:    production
      PORT:        4000
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     catpomo
      DB_USER:     catpomo
      DB_PASS:     catpomo_secret
      JWT_SECRET:  change_me_in_production_please
      CORS_ORIGIN: "*"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── 3. React Frontend (nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty = nginx proxies /api/ to the api service internally
        VITE_API_URL: ""
    container_name: catpomo-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  pgdata:
    name: catpomo-pgdata

networks:
  default:
    name: catpomo-network
